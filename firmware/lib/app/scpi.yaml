# Copyright (c) 2025 MTA, Inc.
#
# This file defines all the SCPI commands recognized by the interpreter.
# It should generally include both standard SCPI commands like those prescribed by
# IEEE 488.2, and custom commands specific to the instrument.
#
# A command definition consists of the following components:
# - `syntax`: The SCPI command syntax. The entire hierarchical path should be
#   included, starting with the command name and including all subcommands.
#   Optional portions of a command path element can be indicated in lowercase.
# - `description`: A brief description of what the command does. This is not
#   included in the generated code, but is used for documentation purposes.
# - `handler`: The name of the function that will handle the command when it is
#   executed. This function should be defined in the concrete interpreter class.
# - `parameters`: An optional list of parameters that the command accepts.
#   Each parameter should have a `name`, `type`, and `description`. The `type`
#   can be a simple type like `number` or `string`, or an `enum` type with a list of
#   possible values. A parameter can be marked as optional by providing a
#   `default` value. Note that all optional parameters must be terminal, or
#   the command will not be recognized correctly.
#
# This file is processed by the `trie_generator.py` script to generate the
# data structures required by the SCPI interpreter.

class_name: App
namespace: T76::DRPD
output_file: scpi_commands.cpp

commands:
  ############################
  # Default SCPI commands
  ############################

  - syntax:       "*IDN?"
    description:  "Query the instrument identification string."
    handler:      _queryIDN

  - syntax:       "*RST"
    description:  "Reset the instrument to its power-on state."
    handler:      _resetInstrument

  - syntax:       "SYSTem:ERRor?"
    description:  "Query the error queue and return the oldest error."
    handler:      _querySystemError

  - syntax:       "SYSTem:MEMory?"
    description:  "Query the amount of free memory on the FreeRTOS heap in bytes."
    handler:      _querySystemMemory

  - syntax:       "SYSTem:SPeed?"
    description:  "Query the system clock frequency in hertz."
    handler:      _querySystemSpeed

  - syntax:       "SYSTem:UPTime?"
    description:  "Query the number of microseconds since the system was booted."
    handler:      _querySystemUptime

  - syntax:       "SYSTem:TIMEstamp?"
    description:  "Query the current timestamp in microseconds."
    handler:      _querySystemTimestamp

  - syntax:       "SYSTem:FIRMware:UPDater"
    description:  "Reboot into the resident firmware updater bootloader."
    handler:      _enterFirmwareUpdater

  ############################
  # Device status register
  ############################

  - syntax:       "STATus:DEVice?"
    description:  |
                    Query device status register; returns a 32-bit integer value and clears it.
                    The returned value is a bitfield with the following bits:
                    
                    - Bit 0 (0x00000001): VBusStatusChanged - VBUS status changed
                    - Bit 1 (0x00000002): RoleChanged - CC bus controller role changed
                    - Bit 2 (0x00000004): CaptureStatusChanged - Message capture status changed
                    - Bit 3 (0x00000008): CCBusStatusChanged - CC bus controller status changed
                    - Bit 4 (0x00000010): TriggerStatusChanged - Trigger controller status changed
                    - Bit 5 (0x00000020): SinkPDOListChanged - Sink PDO list changed
                    - Bit 6 (0x00000040): SinkStatusChanged - Sink status changed
                    - Bit 7 (0x00000080): MessageReceived - New message received on CC bus
                    
                    Multiple bits may be set simultaneously. Reading this register clears all bits.
    handler:      _queryDeviceStatus

  ############################
  # Analog monitor commands
  ############################

  - syntax:       "MEASure:ALL?"
    description:  |-
                    Measure all analog monitor voltages and currents.
                    Returns comma-separated values in the following order:
                    - VBUS capture timestamp (uint64, microseconds)
                    - VBUS voltage
                    - VBUS current
                    - DUT CC1 voltage
                    - DUT CC2 voltage
                    - USDS CC1 voltage
                    - USDS CC2 voltage
                    - ADC VREF voltage
                    - Ground reference voltage
                    - Current reference voltage
                    - Accumulation elapsed time (uint64, microseconds)
                    - Accumulated absolute charge (uint32, mAh)
                    - Accumulated absolute energy (uint32, mWh)
    handler:      _measureAllAnalogValues

  - syntax:       "MEASure:ACCumulated?"
    description:  |-
                    Query accumulated VBUS charge and energy counters.
                    Returns comma-separated values in the following order:
                    - Accumulation elapsed time (uint64, microseconds)
                    - Accumulated absolute charge (uint32, mAh)
                    - Accumulated absolute energy (uint32, mWh)
    handler:      _measureAccumulatedValues

  - syntax:       "MEASure:ACCumulated:RESET"
    description:  |-
                    Reset the accumulated VBUS charge and energy counters.
                    The accumulation start timestamp is set to the current system
                    time, and both counters are cleared to zero.
    handler:      _resetAccumulatedValues

  - syntax:       "MEASure:VOLTage:VBUS?"
    description:  "Measure the VBUS voltage."
    handler:      _measureVBusVoltage

  - syntax:       "MEASure:CURRent:VBUS?"
    description:  "Measure the VBUS current."
    handler:      _measureVBusCurrent

  - syntax:       "MEASure:VOLTage:CC:DUT1?"
    description:  "Measure the DUT CC1 voltage."
    handler:      _measureDUTCC1Voltage

  - syntax:       "MEASure:VOLTage:CC:DUT2?"
    description:  "Measure the DUT CC2 voltage."
    handler:      _measureDUTCC2Voltage

  - syntax:       "MEASure:VOLTage:CC:USDS1?"
    description:  "Measure the USDS CC1 voltage."
    handler:      _measureUSDSCC1Voltage

  - syntax:       "MEASure:VOLTage:CC:USDS2?"
    description:  "Measure the USDS CC2 voltage."
    handler:      _measureUSDSCC2Voltage

  - syntax:       "MEASure:VOLTage:REF:ADC?"
    description:  "Measure the ADC reference voltage."
    handler:      _measureADCRefVoltage

  - syntax:       "MEASure:VOLTage:REF:CURRent?"
    description:  "Measure the current reference voltage."
    handler:      _measureCurrentRefVoltage

  - syntax:       "MEASure:VOLTage:REF:GND?"
    description:  "Measure the ground reference voltage."
    handler:      _measureGroundRefVoltage

  ############################
  # Bus controller commands
  ############################

  - syntax:       "BUS:CC:ROLE?"
    description:  "Query the CC bus controller role"
    handler:      _queryCCBusControllerRole

  - syntax:       "BUS:CC:ROLE"
    description:  "Set the CC bus controller role"
    parameters:
      - name:        role
        type:        enum
        choices:     ["DISABLED", "OBSERVER", "SINK"]
        description: "The desired role for the CC bus controller."
    errors:
      -104:
        message:     "Data type error"
        description: "The role parameter was missing or was not parsed as a valid enumerated value."
      -224:
        message:     "Illegal parameter value"
        description: "The role value was not one of DISABLED, OBSERVER, or SINK."
    handler:      _setCCBusControllerRole

  - syntax:       "BUS:CC:ROLE:STATus?"
    description:  "Query the CC bus controller role status. Returns one of: UNATTACHED, SOURCE_FOUND, ATTACHED"
    handler:      _queryCCBusControllerRoleStatus

  - syntax:       "BUS:CC:CAPture:CYCLETIME?"
    description:  "Query the length of a capture cycle in nanoseconds"
    handler:      _queryCCBusCaptureCycleTime

  - syntax:       "BUS:CC:CAPture:COUNT?"
    description:  "Query the number of captured CC bus messages"
    handler:      _queryCCBusCapturedMessageCount

  - syntax:       "BUS:CC:CAPture:DATA?"
    description:  |
                    Query the CC bus for the next available captured message.
                    If no messages are available, returns an error.
                    Messages are returned as arbitrary data blocks with the following
                    format:

                    - Start timestamp (8 bytes, uint64_t): The timestamp of when message capture started, in microseconds.
                    - End timestamp (8 bytes, uint64_t): The timestamp of when message capture ended, in microseconds.
                    - Message decoding result (4 bytes, uint32_t): The result of decoding the message.
                      Possible values are:
                      - 0: Success
                      - 1: Invalid K-code
                      - 2: CRC error
                      - 3: Timeout error
                      - 4: Incomplete message
                    - SOP (4 bytes): The Start of Packet identifier.
                    - Pulse count (4 bytes, uint32_t): The number of pulses in the captured message.
                    - Pulse widths (N * 2 bytes, uint16_t): An array of pulse widths in PIO cycles.
                    - Data length (4 bytes, uint32_t): The length of the decoded data in bytes.
                    - Decoded data (M * 1 bytes, uint8_t): The decoded message
    errors:
      -200:
        message:     "Execution error"
        description: "No captured CC bus messages are available to return."
    handler:      _queryCCBusNextCapturedMessage

  - syntax:       "BUS:CC:CAPture:EN"
    description:  "Enable or disable CC bus message capture"
    parameters:
      - name:        state
        type:        enum
        choices:     ["ON", "OFF"]
        description: "The desired capture state."
    errors:
      -224:
        message:     "Illegal parameter value"
        description: "The capture state value was not ON or OFF."
    handler:      _setCCBusMessageCaptureState

  - syntax:       "BUS:CC:CAPture:EN?"
    description:  "Query the CC bus message capture status"
    handler:      _queryCCBusMessageCaptureState

  - syntax:       "BUS:CC:CAPture:CLEAR"
    description:  "Clear the captured CC bus message buffer"
    handler:      _clearCCBusCapturedMessages

  - syntax:       "BUS:VBUS:STATus?"
    description:  |
                    Query the VBUS status and latched protection event timestamps.
                    Returns three comma-separated fields:
                    - Status token: ENABLED, DISABLED, OVP, or OCP
                    - Most recent OVP event timestamp in microseconds, or NONE
                    - Most recent OCP event timestamp in microseconds, or NONE
                    If OVP or OCP is returned, the VBUS controller is in a FAULT state and must be reset.
    handler:      _queryVBusStatus

  - syntax:       "BUS:VBUS:RESET"
    description:  "Reset the VBUS controller from a FAULT state."
    handler:      _resetVBus

  - syntax:       "BUS:VBUS:OVPThreshold"
    description:  "Set the VBUS overvoltage protection threshold in millivolts."
    parameters:
      - name:        threshold_mv
        type:        number
        description: "The desired OVP threshold in millivolts."
    errors:
      -222:
        message:     "Data out of range"
        description: "The OVP threshold was negative or greater than the supported 60 V limit."
    handler:      _setVBusOVPThreshold

  - syntax:       "BUS:VBUS:OVPThreshold?"
    description:  "Query the VBUS overvoltage protection threshold in millivolts"
    handler:      _queryVBusOVPThreshold

  - syntax:       "BUS:VBUS:OCPThreshold"
    description:  "Set the VBUS overcurrent protection threshold in milliamps."
    parameters:
      - name:        threshold_ma
        type:        number
        description: "The desired OCP threshold in milliamps."
    errors:
      -222:
        message:     "Data out of range"
        description: "The OCP threshold was negative or greater than the supported 6 A limit."
    handler:      _setVBusOCPThreshold

  - syntax:       "BUS:VBUS:OCPThreshold?"
    description:  "Query the VBUS overcurrent protection threshold in milliamps"
    handler:      _queryVBusOCPThreshold

  - syntax:       "BUS:VBUS:CALibrate?"
    description:  |-
                    Query the full VBUS correction table.
                    Returns 61 comma-separated correction values ordered by
                    raw VBUS bucket from 0V through 60V.
    handler:      _queryVBusCalibration

  - syntax:       "BUS:VBUS:CALibrate"
    description:  |-
                    Capture the current live VBUS reading and store the
                    resulting correction for the specified raw VBUS bucket.
                    The command stores bucket - measured_vbus for the selected
                    integer raw bucket and persists the updated correction table.
    parameters:
      - name:        bucket
        type:        number
        description: "Raw integer-voltage VBUS bucket to update, from 0 to 60."
    errors:
      -109:
        message:     "Missing parameter"
        description: "No calibration bucket parameter was provided."
      -222:
        message:     "Data out of range"
        description: "The calibration bucket was outside the supported range of 0 through 60."
      -224:
        message:     "Illegal parameter value"
        description: "The calibration bucket was not an integer value."
    handler:      _setVBusCalibrationPoint

  - syntax:       "BUS:VBUS:CALibrate:DEFault"
    description:  |-
                    Restore the full VBUS correction table to its default
                    firmware-defined values and persist the updated table.
    handler:      _resetVBusCalibration

  ############################
  # Sink commands
  ############################

  - syntax:       "SINK:PDO:COUNT?"
    description:  |
                    Query the number of currently available source PDOs.
                    Returns SPR PDOs after initial Source_Capabilities and includes
                    EPR PDOs as soon as EPR Source Capabilities are retrieved.
                    Returns a single integer value.
    errors:
      -200:
        message:     "Execution error"
        description: "The CC bus controller is in Sink role, but no Sink object is available."
      -221:
        message:     "Settings conflict"
        description: "The device is not currently operating in Sink role."
    handler:      _querySinkAvailablePDOCount

  - syntax:       "SINK:PDO?"
    description:  |
                    Query information about a PDO at the specified index in the current
                    merged source capability list (SPR first, then EPR when available).
                    Returns comma-separated values with format depending on PDO type:
                    
                    - Fixed Supply PDO: "FIXED,<voltage>,<max_current>"
                      - voltage: Voltage in volts (float)
                      - max_current: Maximum current in amps (float)
                    
                    - Variable Supply PDO: "VARIABLE,<min_voltage>,<max_voltage>,<max_current>"
                      - min_voltage: Minimum voltage in volts (float)
                      - max_voltage: Maximum voltage in volts (float)
                      - max_current: Maximum current in amps (float)
                    
                    - Battery Supply PDO: "BATTERY,<min_voltage>,<max_voltage>,<max_power>"
                      - min_voltage: Minimum voltage in volts (float)
                      - max_voltage: Maximum voltage in volts (float)
                      - max_power: Maximum power in watts (float)
                    
                    - SPR PPS APDO: "SPR_PPS,<min_voltage>,<max_voltage>,<max_current>"
                      - min_voltage: Minimum voltage in volts (float)
                      - max_voltage: Maximum voltage in volts (float)
                      - max_current: Maximum current in amps (float)

                    - SPR AVS APDO: "SPR_AVS,<min_voltage>,<max_voltage>,<max_power>"
                      - min_voltage: Minimum voltage in volts (float)
                      - max_voltage: Maximum voltage in volts (float)
                      - max_power: Maximum power in watts (float)

                    - EPR AVS APDO: "EPR_AVS,<min_voltage>,<max_voltage>,<max_power>"
                      - min_voltage: Minimum voltage in volts (float)
                      - max_voltage: Maximum voltage in volts (float)
                      - max_power: Maximum power in watts (float)
    parameters:
      - name:        index
        type:        number
        description: "The index of the requested PDO (0-based)."
    errors:
      -200:
        message:     "Execution error"
        description: "The CC bus controller is in Sink role, but no Sink object is available."
      -221:
        message:     "Settings conflict"
        description: "The device is not currently operating in Sink role."
      -224:
        message:     "Illegal parameter value"
        description: "The requested PDO index does not exist in the current source capability list."
    handler:      _querySinkRequestedPDOAtIndex

  - syntax:       "SINK:PDO"
    description:  |
                    Request a PDO at the specified index with a specific voltage and current.
                    The sink will request the specified current from the source, or the maximum
                    available current if 0 is specified.
    parameters:
      - name:        index
        type:        number
        description: "The index of the PDO to request (0-based)."
      - name:       voltage_mv
        type:        number
        description: "The desired voltage in millivolts."
      - name:        current_ma
        type:        number
        description: "The desired current in milliamps. Set to 0 to request the maximum available current."
    errors:
      -200:
        message:     "Execution error"
        description: "The CC bus controller is in Sink role, but no Sink object is available."
      -221:
        message:     "Settings conflict"
        description: "The device is not in Sink role, the Sink state cannot accept a PDO request, or the sink policy rejected the request."
    handler:      _setSinkPDO

  - syntax:       "SINK:STATUS?"
    description:  |
                    Query the current state of the sink state machine.
                    Returns one of:
                    - DISCONNECTED: No source detected
                    - PE_SNK_STARTUP
                    - PE_SNK_DISCOVERY
                    - PE_SNK_WAIT_FOR_CAPABILITIES
                    - PE_SNK_EVALUATE_CAPABILITY
                    - PE_SNK_SELECT_CAPABILITY
                    - PE_SNK_TRANSITION_SINK
                    - PE_SNK_READY
                    - PE_SNK_EPR_MODE_ENTRY
                    - PE_SNK_GIVE_SINK_CAP
                    - PE_SNK_GET_SOURCE_CAP
                    - PE_SNK_EPR_KEEPALIVE
                    - PE_SNK_HARD_RESET
                    - PE_SNK_TRANSITION_TO_DEFAULT
                    - ERROR: An error occurred during negotiation
    errors:
      -200:
        message:     "Execution error"
        description: "The CC bus controller is in Sink role, but no Sink object is available."
      -221:
        message:     "Settings conflict"
        description: "The device is not currently operating in Sink role."
    handler:      _querySinkStatus

  - syntax:       "SINK:STATUS:PDO?"
    description:  |
                    Query information about the negotiated PDO.
                    Returns comma-separated values with format depending on PDO type:
                    
                    - Fixed Supply PDO: "FIXED,<voltage>,<max_current>"
                      - voltage: Voltage in volts (float)
                      - max_current: Maximum current in amps (float)
                    
                    - Variable Supply PDO: "VARIABLE,<min_voltage>,<max_voltage>,<max_current>"
                      - min_voltage: Minimum voltage in volts (float)
                      - max_voltage: Maximum voltage in volts (float)
                      - max_current: Maximum current in amps (float)
                    
                    - Battery Supply PDO: "BATTERY,<min_voltage>,<max_voltage>,<max_power>"
                      - min_voltage: Minimum voltage in volts (float)
                      - max_voltage: Maximum voltage in volts (float)
                      - max_power: Maximum power in watts (float)
                    
                    - SPR PPS APDO: "SPR_PPS,<min_voltage>,<max_voltage>,<max_current>"
                      - min_voltage: Minimum voltage in volts (float)
                      - max_voltage: Maximum voltage in volts (float)
                      - max_current: Maximum current in amps (float)

                    - SPR AVS APDO: "SPR_AVS,<min_voltage>,<max_voltage>,<max_power>"
                      - min_voltage: Minimum voltage in volts (float)
                      - max_voltage: Maximum voltage in volts (float)
                      - max_power: Maximum power in watts (float)

                    - EPR AVS APDO: "EPR_AVS,<min_voltage>,<max_voltage>,<max_power>"
                      - min_voltage: Minimum voltage in volts (float)
                      - max_voltage: Maximum voltage in volts (float)
                      - max_power: Maximum power in watts (float)
                    
                    Returns "NONE" if no PDO has been negotiated yet.
    errors:
      -200:
        message:     "Execution error"
        description: "The CC bus controller is in Sink role, but no Sink object is available."
      -221:
        message:     "Settings conflict"
        description: "The device is not currently operating in Sink role."
    handler:      _querySinkNegotiatedPDO

  - syntax:       "SINK:STATUS:VOLTAGE?"
    description:  |
                    Query the negotiated voltage.
                    Returns a single float value in millivolts.
                    Returns 0 if no voltage has been negotiated.
    errors:
      -200:
        message:     "Execution error"
        description: "The CC bus controller is in Sink role, but no Sink object is available."
      -221:
        message:     "Settings conflict"
        description: "The device is not currently operating in Sink role."
    handler:      _querySinkNegotiatedVoltage

  - syntax:       "SINK:STATUS:CURRENT?"
    description:  |
                    Query the negotiated current.
                    Returns a single float value in milliamps.
                    Returns 0 if no current has been negotiated.
    errors:
      -200:
        message:     "Execution error"
        description: "The CC bus controller is in Sink role, but no Sink object is available."
      -221:
        message:     "Settings conflict"
        description: "The device is not currently operating in Sink role."
    handler:      _querySinkNegotiatedCurrent

  - syntax:       "SINK:STATUS:ERROR?"
    description:  |
                    Query the error status of the sink.
                    Returns:
                    - 1: Sink is in ERROR state
                    - 0: Sink is not in ERROR state
    errors:
      -200:
        message:     "Execution error"
        description: "The CC bus controller is in Sink role, but no Sink object is available."
      -221:
        message:     "Settings conflict"
        description: "The device is not currently operating in Sink role."
    handler:      _querySinkErrorStatus

  ############################
  # Trigger commands
  ############################

  - syntax:       "TRIGger:RESET"
    description:  "Reset the trigger controller"
    handler:      _resetTriggerController

  - syntax:       "TRIGger:STATus?"
    description:  "Query the trigger controller status. Returns one of: IDLE, ARMED, TRIGGERED"
    handler:      _queryTriggerControllerStatus

  - syntax:       "TRIGger:EVent:TYPE"
    description:  "Set the trigger event type"
    parameters:
      - name:        mode
        type:        enum
        choices:     ["OFF", "PREAMBLE_START", "SOP_START", "HEADER_START", "DATA_START", "MESSAGE_COMPLETE", "HARD_RESET_RECEIVED", "INVALID_KCODE", "CRC_ERROR", "TIMEOUT_ERROR", "RUNT_PULSE_ERROR", "ANY_ERROR"]
        description: "The desired trigger event type."
    errors:
      -224:
        message:     "Illegal parameter value"
        description: "The trigger event type was not one of the supported trigger modes."
    handler:      _setTriggerEventType

  - syntax:       "TRIGger:EVent:TYPE?"
    description:  "Query the trigger event type"
    handler:      _queryTriggerEventType

  - syntax:       "TRIGger:EVent:THRESHold"
    description:  "Set the number of events before triggering"
    parameters:
      - name:        count
        type:        number
        description: "The desired number of events before triggering."
    handler:      _setTriggerEventThreshold

  - syntax:       "TRIGger:EVent:THRESHold?"
    description:  "Query the number of events before triggering"
    handler:      _queryTriggerEventThreshold

  - syntax:       "TRIGger:EVent:SENDer"
    description:  |
                    Set the sender filter used in addition to the selected trigger event criteria.
                    Supported sender values are:
                    - ANY for no sender constraint
                    - SOURCE for source-originated messages
                    - SINK for sink-originated messages
                    - CABLE for cable or VPD-originated messages

                    For plain SOP traffic, SOURCE and SINK are derived from the header power-role bit.
                    For SOP' / SOP'' and debug variants, UFP_DFP maps to SOURCE and CABLE_PLUG_VPD maps to CABLE.
                    Sender filtering is ignored until the header is known, starting at DATA_START.
    parameters:
      - name:        sender
        type:        enum
        choices:     ["ANY", "SOURCE", "SINK", "CABLE"]
        description: "The desired sender filter."
    errors:
      -224:
        message:     "Illegal parameter value"
        description: "The sender filter was not ANY, SOURCE, SINK, or CABLE."
    handler:      _setTriggerEventSenderFilter

  - syntax:       "TRIGger:EVent:SENDer?"
    description:  "Query the configured sender filter."
    handler:      _queryTriggerEventSenderFilter

  - syntax:       "TRIGger:EVent:MSGType:FILTer"
    description:  |
                    Set one message type filter slot used in addition to the selected trigger event criteria.
                    The first parameter is a zero-based slot index. The second parameter must use one of these forms:
                    - CONTROL:<n> for messages with zero data objects (numDataObjects() == 0)
                    - DATA:<n> for messages with one or more data objects (numDataObjects() > 0)

                    Example:
                    TRIGger:EVent:MSGType:FILTer 0, CONTROL:3
                    TRIGger:EVent:MSGType:FILTer 1, DATA:1
                    TRIGger:EVent:MSGType:FILTer 2, DATA:15

                    If no filter slots are configured, any message type matches.
                    Message type filters only apply once the PD header is known, starting at DATA_START and for later
                    completion/error events where decoding already produced a header.
    parameters:
      - name:        slot
        type:        number
        description: "Zero-based message type filter slot index."
      - name:        filter
        type:        string
        description: "Message type filter entry formatted as CONTROL:<n> or DATA:<n>."
    errors:
      -224:
        message:     "Illegal parameter value"
        description: "The slot index was invalid, the filter token was malformed, the slot was out of range, or the filter duplicated another slot."
    handler:      _setTriggerEventMessageTypeFilter

  - syntax:       "TRIGger:EVent:MSGType:FILTer?"
    description:  |
                    Query the configured message type filter list in slot order.
                    Returns space-separated entries in CONTROL:<n> / DATA:<n> form.
                    Returns an empty response when no message type filters are configured.
    handler:      _queryTriggerEventMessageTypeFilter

  - syntax:       "TRIGger:EVent:MSGType:FILTer:CLEAR"
    description:  "Clear all configured message type filters. After clearing, any message type matches if the other trigger conditions are met."
    handler:      _clearTriggerEventMessageTypeFilter

  - syntax:       "TRIGger:EVent:AUTOREPEAT"
    description:  "Enable or disable auto-repeating triggers"
    parameters:
      - name:        state
        type:        enum
        choices:     ["ON", "OFF"]
        description: "The desired auto-repeat state."
    handler:      _setTriggerAutoRepeatState

  - syntax:       "TRIGger:EVent:AUTOREPEAT?"
    description:  "Query the auto-repeat state"
    handler:      _queryTriggerAutoRepeatState

  - syntax:       "TRIGger:EVent:COUNT?"
    description:  "Query the number of events counted since the last reset"
    handler:      _queryTriggerEventCount

  - syntax:       "TRIGger:SYNC:MODE"
    description:  "Set the sync output mode"
    parameters:
      - name:        mode
        type:        enum
        choices:     ["PULSE_HIGH", "PULSE_LOW", "TOGGLE", "PULL_DOWN"]
        description: "The desired sync output mode."
    errors:
      -224:
        message:     "Illegal parameter value"
        description: "The sync output mode was not PULSE_HIGH, PULSE_LOW, TOGGLE, or PULL_DOWN."
    handler:      _setSyncOutputMode

  - syntax:       "TRIGger:SYNC:MODE?"
    description:  "Query the sync output mode"
    handler:      _querySyncOutputMode

  - syntax:       "TRIGger:SYNC:PULSEwidth"
    description:  "Set the sync pulse width in microseconds"
    parameters:
      - name:        width_us
        type:        number
